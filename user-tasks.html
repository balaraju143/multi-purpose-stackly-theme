<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Tasks</title>

<link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="content">

    <div class="welcome">

        <h2>My Tasks</h2>

    </div>

    <h2>Task Overview</h2>

    <div class="cards">

        <div class="card">
            <h3>245</h3>
            <p>Total Tasks</p>
        </div>

        <div class="card">
            <h3>185</h3>
            <p>Completed Tasks</p>
        </div>

        <div class="card">
            <h3>42</h3>
            <p>In Progress</p>
        </div>

        <div class="card">
            <h3>18</h3>
            <p>Pending Tasks</p>
        </div>

    </div>


    <div class="orders">

        <table>

            <thead>

                <tr>
                    <th>Task ID</th>
                    <th>Task Name</th>
                    <th>Priority</th>
                    <th>Status</th>
                </tr>

            </thead>

            <tbody>

                <tr>
                    <td>#1001</td>
                    <td>Homepage Design</td>
                    <td>High</td>
                    <td>Completed</td>
                </tr>

                <tr>
                    <td>#1002</td>
                    <td>Bug Fixing</td>
                    <td>Medium</td>
                    <td>In Progress</td>
                </tr>

                <tr>
                    <td>#1003</td>
                    <td>API Integration</td>
                    <td>High</td>
                    <td>Pending</td>
                </tr>

                <tr>
                    <td>#1004</td>
                    <td>Dashboard Testing</td>
                    <td>Low</td>
                    <td>Completed</td>
                </tr>

            </tbody>

        </table>

        <button
            class="back-btn"
            onclick="window.location.href='user-dashboard.html'">

            Back To Dashboard

        </button>

    </div>

</div>

</body>
</html>
