<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly Login</title>

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="css/auth.css">
</head>

<body>


<div class="preloader" id="preloader">
    <div class="loader">
        <div class="loader-logo">
            <i class="fa-solid fa-layer-group"></i>
            <span>Stackly</span>
        </div>

        <div class="loader-bars">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</div>


<div class="auth-container">

    <div class="auth-card">

        <!-- Login Header -->

        <div class="login-header">

            <img src="images/blue-logo.webp"
                 alt="Stackly Logo">

            <h2>Welcome Back</h2>

            <p>
                Login to access your dashboard
                and manage your workspace.
            </p>

        </div>


        <!-- Role Dropdown -->

        <div class="custom-select">

            <div class="select-box"
                 onclick="toggleRoleDropdown()">

                <span id="selectedRole">

                    Select Role

                </span>

                <i class="fa-solid fa-chevron-down"></i>

            </div>

            <div class="select-options"
                 id="roleOptions">

                <div onclick="selectRole('user')">

                    User

                </div>

                <div onclick="selectRole('admin')">

                    Admin

                </div>

            </div>

        </div>

        <input type="hidden"
               id="loginRole">

        <p id="roleError"
           class="error-msg"></p>


        <!-- Email -->

        <input type="email"
               id="email"
               placeholder="Enter Email">

        <p id="emailError"
           class="error-msg"></p>


        <!-- Password -->

        <div class="password-box">

            <input type="password"
                   id="password"
                   placeholder="Enter Password">

            <i class="fa-solid fa-eye toggle-icon"
               onclick="togglePassword('password', this)">
            </i>

        </div>

        <p id="passwordError"
           class="error-msg"></p>


        <!-- Forgot Password -->

        <p class="forgot-link">

            <a href="404.html">

                Forgot Password?

            </a>

        </p>


        <!-- Login Button -->

        <button class="login-btn"
                onclick="loginUser()">

            Login To Dashboard

        </button>


        <!-- Register -->

        <p class="register-link">

            Don't have an account?

            <a href="signup.html">

                Register

            </a>

        </p>

    </div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
